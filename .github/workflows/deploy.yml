# ============================================================
# Production Deployment Workflow
# ============================================================
#
# Builds the whole app in CI (npm ci + npm run build), ships the entire
# project -- full node_modules included -- to the server over SSH, runs
# pending Prisma migrations there, and kills the running node process so
# the panel's supervisor (Automatic/Production mode) restarts it with the
# new code. The server never runs npm install or npm run build itself --
# that's what was getting OOM-killed on the shared host.
#
# Synced directly into the live deploy path (not a staging dir that gets
# wiped every run), so rsync can diff against last deploy's copy -- unchanged
# files (most of node_modules, most of the time) transfer near-nothing.
#
# No backup/rollback: if a migration fails, fix forward with a new commit.
#
# REQUIRED VARIABLES (Settings > Secrets and variables > Actions > Variables):
#   SSH_HOST      - Server IP or domain
#   SSH_USER      - SSH username
#   DEPLOY_DIR    - Absolute path to the app's working directory on the panel
#   APP_URL       - unused currently, kept for future use
#
# REQUIRED SECRETS (Settings > Secrets and variables > Actions > Secrets):
#   SSH_PRIVATE_KEY - Private SSH key (server also accepts password auth,
#                     but key auth is used here since the server supports both)
#
# .env is managed manually on the server (DEPLOY_DIR/.env) and is never
# touched by this workflow -- not written, not overwritten, not deleted.
#
# Panel's "Startup command" must be `npm start` (or `node_modules/.bin/next
# start` equivalent) with Working directory set to DEPLOY_DIR, in
# Automatic (Production) mode so it auto-restarts when killed.
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or commit SHA). Defaults to main.'
        required: false
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx') }}
          restore-keys: |
            next-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build
        env:
          # Placeholder only -- never connected to. src/lib/db.ts constructs
          # PrismaClient at module load (imported by every API route), and
          # Prisma 7 requires non-empty options even though `next build`'s
          # page-data-collection phase never actually runs a query. Real
          # DATABASE_URL lives only in the server's manually-managed .env.
          DATABASE_URL: postgresql://build:build@localhost:5432/build?schema=public
        run: npm run build

      - name: Assemble deploy artifact (whole project)
        run: |
          set -Eeuo pipefail
          mkdir -p dist/app
          cp -r .next node_modules public prisma dist/app/
          cp package.json package-lock.json next.config.ts prisma.config.ts dist/app/

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/app
          retention-days: 3
          # Default excludes dotfiles/dirs -- .next starts with a dot and was
          # silently dropped entirely without this, despite the "cp -r .next"
          # step above succeeding. That's what caused the 404s.
          include-hidden-files: true

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate configuration
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          for var in SSH_HOST SSH_USER DEPLOY_DIR SSH_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::$var is required"
              exit 1
            fi
          done

      - name: Checkout (for deploy script)
        uses: actions/checkout@v4

      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: dist/app

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add SSH host fingerprint
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync build to server
        env:
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -Eeuo pipefail
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_DIR'"
          rsync -avz --delete --itemize-changes \
            --exclude 'public/uploads/' \
            --exclude '.env' \
            dist/app/ "$SSH_USER@$SSH_HOST:$DEPLOY_DIR/"

      - name: Run deploy script on server
        env:
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -Eeuo pipefail
          ssh "$SSH_USER@$SSH_HOST" bash -s -- "$DEPLOY_DIR" < .github/scripts/deploy.sh
